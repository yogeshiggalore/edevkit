<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c1730" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="description" content="{% block description %}edevkit — open-source embedded developer kits.{% endblock %}">
  <title>{% block title %}edevkit{% endblock %}</title>

  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">

  {# pre-paint theme application — prevents flash of light theme on dark-preferring users #}
  <script>
    (function () {
      try {
        var t = localStorage.getItem('edev_theme');
        if (t === 'dark' || t === 'light')
          document.documentElement.setAttribute('data-theme', t);
      } catch (e) { /* private mode etc. */ }
    })();
  </script>

  {% block head_extra %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  <script type="module" src="/static/script.js"></script>
</body>
</html>
