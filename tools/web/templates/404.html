{% extends "base.html" %}

{% block title %}404 · edevkit{% endblock %}

{% block body %}
<main class="min-h-screen flex items-center justify-center px-6">
  <div class="text-center max-w-lg animate-fade-up">
    <div class="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-2xl bg-brand-100 dark:bg-brand-500/15 text-brand-700 dark:text-brand-300">
      <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.3-4.3"/>
      </svg>
    </div>
    <p class="text-[11px] font-mono font-semibold uppercase tracking-[0.18em] text-ink-500 dark:text-ink-400">Error 404</p>
    <h1 class="mt-2 text-5xl sm:text-6xl font-extrabold tracking-tight bg-gradient-to-r from-brand-600 to-fuchsia-500 dark:from-brand-400 dark:to-fuchsia-400 bg-clip-text text-transparent">
      Page not found
    </h1>
    <p class="mt-4 text-ink-600 dark:text-ink-400">
      Nothing at <code class="font-mono px-1.5 py-0.5 rounded bg-ink-100 dark:bg-ink-800">{{ path }}</code>.
    </p>
    <a href="/" class="mt-8 inline-flex items-center gap-2 px-5 py-3 rounded-xl text-sm font-semibold bg-gradient-to-br from-brand-500 to-brand-600 text-white shadow-lg shadow-brand-500/20 hover:shadow-brand-500/35 hover:-translate-y-0.5 transition-all">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to the hub
    </a>
  </div>
</main>
{% endblock %}
