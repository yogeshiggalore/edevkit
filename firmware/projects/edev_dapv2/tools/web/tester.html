<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>edev_dapv2 tester</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f1115;
    --fg: #e6e7eb;
    --fg-dim: #9097a5;
    --accent: #7aa2f7;
    --good: #9ece6a;
    --bad:  #f7768e;
    --border: #2a2f3a;
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--fg); background: var(--bg);
    display: flex; flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .id { color: var(--fg-dim); font-family: var(--mono); font-size: 12px; }
  header .spacer { flex: 1; }
  header .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--bad); display: inline-block;
  }
  header .dot.on { background: var(--good); }

  button {
    background: transparent; color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 7px 14px; cursor: pointer; font: inherit;
  }
  button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #0f1115; border-color: var(--accent); }
  button.primary:hover:not(:disabled) { filter: brightness(1.1); color: #0f1115; }

  main {
    flex: 1; min-height: 0;
    display: grid; grid-template-columns: 1fr 360px;
  }
  .col { padding: 20px 24px; overflow-y: auto; }
  .col + .col {
    border-left: 1px solid var(--border);
    background: #0a0c10;
    padding: 0;
  }

  .card {
    margin-bottom: 24px;
  }
  .card h2 {
    margin: 0 0 10px 0;
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-dim);
  }
  .card .row { display: flex; gap: 8px; align-items: center; }

  .kv {
    margin: 0;
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 18px;
    font-family: var(--mono); font-size: 12.5px;
  }
  .kv dt { color: var(--fg-dim); }
  .kv dd { margin: 0; word-break: break-all; }
  .kv dd.good { color: var(--good); }
  .kv dd.bad  { color: var(--bad); }

  input[type="text"] {
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 7px 10px;
    font-family: var(--mono); font-size: 13px;
    width: 100%;
  }
  input:focus { outline: none; border-color: var(--accent); }

  .log {
    height: 100%;
    display: flex; flex-direction: column;
  }
  .log .head {
    padding: 14px 20px 8px;
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .log .head h2 {
    margin: 0; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg-dim);
  }
  .log .head button { padding: 3px 10px; font-size: 11px; }
  .log .body {
    flex: 1; overflow-y: auto;
    padding: 10px 20px;
    font-family: var(--mono); font-size: 11px; line-height: 1.6;
  }
  .log .ln { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
  .log .ln.tx    { color: var(--accent); }
  .log .ln.rx    { color: var(--good); }
  .log .ln.info  { color: var(--fg-dim); }
  .log .ln.error { color: var(--bad); }
  .log .ts { color: var(--fg-dim); margin-right: 8px; }

  .note {
    background: rgba(122, 162, 247, 0.07);
    border-left: 2px solid var(--accent);
    padding: 10px 14px;
    color: var(--fg-dim);
    font-size: 12.5px;
    margin-bottom: 20px;
    border-radius: 0 4px 4px 0;
  }
  .note b { color: var(--fg); }
  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>edev_dapv2 tester</h1>
  <span class="id" id="device-id"></span>
  <span class="spacer"></span>
  <span class="dot" id="dot"></span>
  <button id="btn-connect" class="primary">Connect</button>
  <button id="btn-disconnect" disabled>Disconnect</button>
</header>

<main>
  <div class="col">
    <div class="note" id="webusb-note">
      <b>WebUSB requires Chrome / Edge / Brave</b> served over <code>localhost</code> or HTTPS.
      Click <b>Connect</b>, pick the probe (<code>edev_dapv2 CMSIS-DAP</code>) from the chooser.
    </div>

    <div class="card">
      <h2>Probe info</h2>
      <dl class="kv" id="info-kv"><dd style="color:var(--fg-dim)">connect to see</dd></dl>
    </div>

    <div class="card">
      <h2>Read target IDCODE</h2>
      <div class="row" style="margin-bottom:12px;">
        <button id="btn-idcode" disabled>Run full SWD init + read DP[0]</button>
      </div>
      <dl class="kv" id="idcode-kv"></dl>
    </div>

    <div class="card">
      <h2>Raw DAP command</h2>
      <div class="row" style="margin-bottom:10px;">
        <input type="text" id="raw-hex" placeholder="bytes e.g.  00 F0" value="00 F0">
        <button id="btn-raw" disabled style="flex-shrink:0;">Send</button>
      </div>
      <dl class="kv" id="raw-kv"></dl>
    </div>
  </div>

  <aside class="col log">
    <div class="head">
      <h2>Log</h2>
      <button id="btn-log-clear">clear</button>
    </div>
    <div class="body" id="log"></div>
  </aside>
</main>

<script>
'use strict';

const VID = 0x2E8A;
const PID = 0x000C;
const EP_OUT     = 0x01;
const EP_IN_DAP  = 0x81;

const $ = sel => document.querySelector(sel);
const els = {
  dot         : $('#dot'),
  deviceId    : $('#device-id'),
  webusbNote  : $('#webusb-note'),
  btnConnect  : $('#btn-connect'),
  btnDisconnect: $('#btn-disconnect'),
  infoKv      : $('#info-kv'),
  idcodeKv    : $('#idcode-kv'),
  btnIdcode   : $('#btn-idcode'),
  rawHex      : $('#raw-hex'),
  btnRaw      : $('#btn-raw'),
  rawKv       : $('#raw-kv'),
  log         : $('#log'),
  btnLogClear : $('#btn-log-clear'),
};

let device = null;

/* ---- logging ---- */
function log(kind, msg) {
  const div = document.createElement('div');
  div.className = 'ln ' + kind;
  const ts = new Date().toISOString().slice(11, 23);
  div.innerHTML = `<span class="ts">${ts}</span>${msg}`;
  els.log.appendChild(div);
  els.log.scrollTop = els.log.scrollHeight;
}
function hex(bytes, maxLen = 48) {
  if (!bytes) return '';
  const a = Array.from(bytes.slice(0, maxLen)).map(b => b.toString(16).padStart(2, '0'));
  return a.join(' ') + (bytes.length > maxLen ? ` …(+${bytes.length - maxLen})` : '');
}
function parseHex(s) {
  return new Uint8Array(s.trim().split(/[\s,]+/).filter(Boolean)
                        .map(t => parseInt(t.replace(/^0x/i, ''), 16)));
}

function setConnected(ok) {
  els.dot.className = 'dot' + (ok ? ' on' : '');
  els.btnConnect.disabled = ok;
  els.btnDisconnect.disabled = !ok;
  els.btnIdcode.disabled = !ok;
  els.btnRaw.disabled = !ok;
  if (!ok) {
    els.deviceId.textContent = '';
    els.infoKv.innerHTML  = '<dd style="color:var(--fg-dim)">connect to see</dd>';
    els.idcodeKv.innerHTML = '';
    els.rawKv.innerHTML   = '';
  }
}

/* ---- WebUSB transport ---- */
async function connect() {
  if (!navigator.usb) { log('error', 'navigator.usb not available'); return; }
  try {
    device = await navigator.usb.requestDevice({ filters: [{ vendorId: VID, productId: PID }] });
    await device.open();
    if (device.configuration === null) await device.selectConfiguration(1);
    await device.claimInterface(0);
    setConnected(true);
    const sn = device.serialNumber || '(no serial)';
    els.deviceId.textContent = `${device.productName} · ${sn}`;
    log('info', `connected ${device.productName} / ${sn}`);
    await runInfoDump();
  } catch (e) {
    log('error', 'connect failed: ' + e.message);
    device = null; setConnected(false);
  }
}
async function disconnect() {
  if (device) {
    try { await device.releaseInterface(0); } catch (e) {}
    try { await device.close(); } catch (e) {}
  }
  device = null; setConnected(false);
  log('info', 'disconnected');
}
async function dap(req) {
  if (!device) throw new Error('not connected');
  log('tx', `→ ${hex(req)}`);
  await device.transferOut(EP_OUT, req);
  const r = await device.transferIn(EP_IN_DAP, 512);
  if (r.status !== 'ok') throw new Error('transferIn ' + r.status);
  const resp = new Uint8Array(r.data.buffer);
  log('rx', `← ${hex(resp)}`);
  return resp;
}

/* ---- DAP_Info dump ---- */
const INFO_SUBS = [
  [0x01, 'Vendor',          'str'],
  [0x02, 'Product',         'str'],
  [0x03, 'Serial',          'str'],
  [0x04, 'DAP protocol',    'str'],
  [0x09, 'Firmware version','str'],
  [0xF0, 'Capabilities',    'cap'],
  [0xFE, 'Packet count',    'u8'],
  [0xFF, 'Packet size',     'u16'],
];
const CAP_BITS = ['SWD','JTAG','SWO UART','SWO Manch','Atomic','TD Timer','SWO Stream','UART Comm'];

function decode(kind, payload) {
  const n = payload[0]; const d = payload.slice(1, 1 + n);
  if (n === 0) return '(empty)';
  if (kind === 'str') return new TextDecoder().decode(d).replace(/\0+$/, '');
  if (kind === 'u8')  return d[0];
  if (kind === 'u16') return d[0] | (d[1] << 8);
  if (kind === 'cap') {
    const set = []; for (let i = 0; i < 8; i++) if (d[0] & (1 << i)) set.push(CAP_BITS[i]);
    return `0x${d[0].toString(16).padStart(2,'0')}  [${set.join(', ')}]`;
  }
  return hex(d);
}
function kv(dl, k, v, cls) {
  const dt = document.createElement('dt'); dt.textContent = k;
  const dd = document.createElement('dd'); dd.textContent = v;
  if (cls) dd.className = cls;
  dl.appendChild(dt); dl.appendChild(dd);
}
async function runInfoDump() {
  els.infoKv.innerHTML = '';
  for (const [sub, label, kind] of INFO_SUBS) {
    try {
      const r = await dap(new Uint8Array([0x00, sub]));
      kv(els.infoKv, label, decode(kind, r.slice(1)));
    } catch (e) {
      kv(els.infoKv, label, '(error: ' + e.message + ')', 'bad');
    }
  }
}

/* ---- Full IDCODE sequence ---- */
const ACK = { 1: 'OK', 2: 'WAIT', 4: 'FAULT', 7: 'NO_ACK' };

async function runIdcode() {
  els.idcodeKv.innerHTML = '';
  try {
    /* 1. DAP_Connect SWD                       */
    await dap(new Uint8Array([0x02, 0x01]));
    /* 2. DAP_SWJ_Clock 1 MHz                   */
    await dap(new Uint8Array([0x11, 0x40,0x42,0x0f,0x00]));
    /* 3. DAP_TransferConfigure                 */
    await dap(new Uint8Array([0x04, 0x00, 0x40,0x00, 0x00,0x00]));
    /* 4. DAP_SWD_Configure                     */
    await dap(new Uint8Array([0x13, 0x00]));
    /* 5. DAP_SWJ_Sequence: line reset + JTAG→SWD switch (136 bits) */
    const swj = new Uint8Array(17);
    for (let i = 0; i < 7; i++) swj[i]    = 0xFF;
    swj[7] = 0x9E; swj[8] = 0xE7;
    for (let i = 9; i < 16; i++) swj[i]   = 0xFF;
    swj[16] = 0x00;
    await dap(new Uint8Array([0x12, 0x88, ...swj]));
    /* 6. DAP_Transfer: read DP[0] (request byte = 0x02) */
    const r = await dap(new Uint8Array([0x05, 0x00, 0x01, 0x02]));
    const count = r[1], ack = r[2];
    const ackName = ACK[ack] || `0x${ack.toString(16)}`;
    kv(els.idcodeKv, 'ACK', ackName, ack === 1 ? 'good' : 'bad');
    if (count > 0 && ack === 1) {
      const idcode = (r[3] | (r[4]<<8) | (r[5]<<16) | (r[6]<<24)) >>> 0;
      kv(els.idcodeKv, 'IDCODE', '0x' + idcode.toString(16).padStart(8,'0'), 'good');
      const designer = (idcode >> 1) & 0x7FF;
      const partno   = (idcode >> 12) & 0xFFFF;
      kv(els.idcodeKv, 'Designer', '0x' + designer.toString(16));
      kv(els.idcodeKv, 'Part number', '0x' + partno.toString(16));
    } else {
      kv(els.idcodeKv, 'note', 'no target on SWCLK/SWDIO?', 'bad');
    }
  } catch (e) {
    kv(els.idcodeKv, 'error', e.message, 'bad');
  }
}

/* ---- Raw hex ---- */
async function sendRaw() {
  els.rawKv.innerHTML = '';
  try {
    const req = parseHex(els.rawHex.value);
    if (req.length === 0) { kv(els.rawKv, 'error', 'no bytes parsed', 'bad'); return; }
    const resp = await dap(req);
    kv(els.rawKv, 'request',  hex(req));
    kv(els.rawKv, 'response', hex(resp));
  } catch (e) {
    kv(els.rawKv, 'error', e.message, 'bad');
  }
}

/* ---- wire up ---- */
if (!navigator.usb) {
  els.webusbNote.innerHTML = '<b>WebUSB not available.</b> Use Chrome / Edge / Brave over localhost or HTTPS.';
}
els.btnConnect.addEventListener('click', connect);
els.btnDisconnect.addEventListener('click', disconnect);
els.btnLogClear.addEventListener('click', () => { els.log.innerHTML = ''; });
els.btnIdcode.addEventListener('click', () => runIdcode());
els.btnRaw.addEventListener('click', () => sendRaw());
els.rawHex.addEventListener('keydown', e => { if (e.key === 'Enter') sendRaw(); });

setConnected(false);
log('info', 'ready — click Connect to begin');
</script>
</body>
</html>
