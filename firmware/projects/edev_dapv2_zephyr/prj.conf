#
# edev_dapv2 Zephyr port — milestone 1 config.
#
# Goal of M1: boot on Pico 2, expose a USB CDC ACM console, blink the on-board
# LED. No DAP wiring yet. Once this builds + flashes + enumerates, layer on the
# DAP subsystem and the swdp_pio_rpi_pico driver.

# Kernel
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Console + logging — routed to USB CDC ACM via board overlay
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_STDOUT_CONSOLE=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y

# USB-Device-Next stack
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# Sample USBD helper (we reuse samples/subsys/usb/common/sample_usbd_init.c)
# VID 0x2E8A is Raspberry Pi Trading's; PID 0x000C is the same value used by
# the pico-sdk edev_dapv2 firmware so host-side allowlists keep working.
CONFIG_SAMPLE_USBD_VID=0x2E8A
CONFIG_SAMPLE_USBD_PID=0x000C
CONFIG_SAMPLE_USBD_MANUFACTURER="Edevkit"
CONFIG_SAMPLE_USBD_PRODUCT="edev_dapv2 (Zephyr)"
CONFIG_SAMPLE_USBD_SELF_POWERED=n
CONFIG_SAMPLE_USBD_REMOTE_WAKEUP=n
CONFIG_SAMPLE_USBD_20_EXTENSION_DESC=y

# Chip-ID serial number — Zephyr's USBD framework calls hwinfo to pull
# RP2350's 64-bit unique ID and exposes it as the SerialNumber string
# descriptor when CONFIG_HWINFO is enabled. Format is a hex string (not the
# "EDV-XXXX-XXXX-XXXX-XXXX" used by pico-sdk firmware — cosmetic only).
CONFIG_HWINFO=y

# BOS chain — needed for MS OS 2.0 Platform Capability descriptor (lets
# Windows auto-bind WINUSB without a .inf file).
CONFIG_USBD_BOS_SUPPORT=y

# Identity strings exposed via DAP_Info command (CMSIS-DAP request 0x00).
CONFIG_CMSIS_DAP_PROBE_VENDOR="Edevkit"
CONFIG_CMSIS_DAP_PROBE_NAME="edev_dapv2 CMSIS-DAP"
CONFIG_CMSIS_DAP_DEVICE_VENDOR="Edevkit"
CONFIG_CMSIS_DAP_DEVICE_NAME="edev_dapv2 (Zephyr)"

# GPIO + drivers
CONFIG_GPIO=y
CONFIG_PIO_RPI_PICO=y
CONFIG_PINCTRL=y
CONFIG_RESET=y

# DAP subsystem — upstream Zephyr cmsis_dap.c with the SWDP bit-banger as M2
# placeholder. The PIO-backed swdp_pio_rpi_pico driver replaces the bit-banger
# in M3 (DT swap from zephyr,swdp-gpio to zephyr,swdp-pio-rpi-pico).
CONFIG_DAP=y
CONFIG_DAP_BACKEND_USB=y
CONFIG_DAP_LOG_LEVEL_INF=y
CONFIG_DP_DRIVER_LOG_LEVEL_INF=y
